name: manage-rua-auth-txt

on:
  workflow_dispatch:
    inputs:
      action:
        description: "upsert or delete"
        required: true
        default: "upsert"
        type: choice
        options:
          - upsert
          - delete
      customer_domain:
        description: "Customer From domain (e.g., example.com)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  dns:
    runs-on: ubuntu-latest
    environment: cloudflare-dns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare token can read zone
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: python3 .github/scripts/manage_rua_auth_txt.py verify-zone

      - name: Apply requested TXT change
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: >-
          python3 .github/scripts/manage_rua_auth_txt.py apply
          --action "${{ inputs.action }}"
          --customer-domain "${{ inputs.customer_domain }}"
